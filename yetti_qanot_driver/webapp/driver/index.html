<!DOCTYPE html>
<html lang="uz">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <title>YettiQanot — Haydovchi</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR6BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="driver-map.css" />
  </head>
  <body>
    <div id="map" aria-label="Xarita"></div>

    <div id="screen-missing" class="screen" hidden>
      <div>
        <p id="missing-msg"></p>
        <p style="opacity: 0.75; font-size: 0.9rem">
          Misol:
          <code>index.html?trip_id=UUID&driver_id=123456789</code>
        </p>
      </div>
    </div>

    <div id="screen-not-found" class="screen" hidden>
      <div>
        <p><strong>Buyurtma topilmadi</strong></p>
        <p style="opacity: 0.8">Reja yoki havola noto‘g‘ri bo‘lishi mumkin.</p>
      </div>
    </div>

    <div id="main-ui" class="overlay-stack" hidden>
      <div class="banner" id="banner" role="status">
        <span class="banner-dot" id="banner-dot" aria-hidden="true"></span>
        <span id="banner-text">Yuklanmoqda…</span>
      </div>

      <div class="rider-card" id="rider-card">
        <h2>Mijoz</h2>
        <div style="font-weight: 800; font-size: 1.05rem" id="rider-name">—</div>
        <div class="phone-row" style="margin-top: 8px">
          <a class="tel" id="rider-phone" href="#">—</a>
          <span style="color: #64748b; font-size: 0.85rem">Qo‘ng‘iroq</span>
        </div>
        <p
          style="margin: 10px 0 0; font-size: 0.9rem; color: #475569"
          id="rider-pickup"
        >
          —
        </p>
      </div>

      <div class="route-panel" id="route-panel" hidden>—</div>

      <div class="bottom-panel">
        <div class="stats-row">
          <div class="stat">
            <label>Narx</label>
            <span class="val" id="stat-fare">—</span>
          </div>
          <div class="stat">
            <label>Masofa</label>
            <span class="val" id="stat-dist">—</span>
          </div>
        </div>
        <p class="status-line" id="status-line"></p>
        <div class="trip-actions">
          <button type="button" class="btn btn-primary" id="btn-arrived" hidden>
            Yetib keldim
          </button>
          <button type="button" class="btn btn-primary" id="btn-start" hidden>
            SAFARNI BOSHLASH
          </button>
          <button type="button" class="btn btn-secondary" id="btn-finish" hidden>
            SAFARNI TUGATISH
          </button>
          <button type="button" class="btn btn-danger-outline" id="btn-cancel" hidden>
            Safarni bekor qilish
          </button>
        </div>
      </div>
    </div>

    <div id="finished-overlay" class="finished-overlay" hidden>
      <div class="finished-card" role="dialog" aria-modal="true">
        <h3>Safar yakunlandi</h3>
        <div class="fare-big" id="finished-fare">—</div>
        <div class="dist" id="finished-dist">—</div>
        <p style="margin-top: 16px; font-size: 0.85rem; color: #94a3b8">
          Tashqi tomonga bosing yoki yopish
        </p>
      </div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="driver-map.js"></script>
  </body>
</html>
